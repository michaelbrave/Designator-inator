name: orchestrator
version: 1.0.0
description: >
  A meta-agent that decomposes work into subtasks, delegates to other pods,
  and synthesizes the results into one response.

requires:
  min_ram_mb: 8192
  min_context: 16384
  gpu: optional

model:
  primary: mistral-7b-instruct-v0.3.Q4_K_M
  minimum: tinyllama-1.1b-chat-v1.0.Q4_K_M
  fallback: claude-sonnet
  fallback_mode: disabled

exposed_tools:
  - name: chat
    description: >
      Send a task to the orchestrator and receive a synthesized response.
    parameters:
      message:
        type: string
        required: true
        description: The task or question to work on

  - name: get_status
    description: Check whether the orchestrator is idle or processing a task.
    parameters: {}

  - name: halt
    description: Cancel the current task and return the orchestrator to idle.
    parameters: {}

internal_tools:
  - workspace
  - pods

isolation: beam
